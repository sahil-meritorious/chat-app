# Render configuration for frontend chat app

type: web-service
name: rag-chat-frontend

# Build settings
buildCommand: "npm install && npm run build"

# Start command - render serves static files from the build directory
startCommand: "serve -s dist -l $PORT"

# Environment variables
envVars:
  - key: REACT_APP_BACKEND_URL
    value: "https://basic-rag-backend.onrender.com"
  - key: NODE_ENV
    value: "production"

# Ports
ports:
  - 10000

# Deploy on push
deployOnPush: true

# Static file settings
# Render automatically serves files from the build directory
# No need to specify static file path as serve handles it

# Health check
# healthCheckPath: "/"

# Logs
logs:
  level: info

